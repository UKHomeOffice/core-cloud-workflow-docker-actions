name: Docker build
description: "Build a Docker image using the specified Dockerfile and tag it with the provided image name and tag."

inputs:
  working_directory:
    description: "Directory to run docker build in (default: repository root)"
    required: false
    type: string
    default: "."
  
  dockerfile:
    description: "Directory/Name of the Dockerfile (default: Dockerfile)"
    required: false
    type: string
    default: "Dockerfile"

  image_name:
    description: "Name of the image"
    required: true
    type: string

  image_tag:
    description: "The tag for the image (default: latest)"
    required: false
    type: string
    default: latest

  tag_latest:
    description: "Should it also use the tag latest (default: true)"
    required: false
    type: boolean
    default: true

outputs:
  docker_build_exit_code:
    description: "The exit code from the docker build command"
    value: ${{ steps.docker_build_exit_code.outputs.exit_code }}

runs:
  using: "composite"

  steps:
    - name: Calculate metadata
      id: docker_meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image_name }}
        tags: |
          type=raw,value=${{ inputs.image_tag }}
          type=raw,value=latest,enable=${{ inputs.tag_latest }}

    - name: Build image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.working_directory }}/${{ inputs.dockerfile }}
        push: false
        tags: ${{ steps.docker_meta.outputs.tags }}
        load: true
    
    - name: Set docker build exit code
      id: docker_build_exit_code
      shell: bash
      run: |
        if [ "${{ steps.docker_build.conclusion }}" = "success" ]; then
          echo "exit_code=0" >> $GITHUB_OUTPUT
        else
          echo "exit_code=1" >> $GITHUB_OUTPUT
        fi
